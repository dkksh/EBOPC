name: RDP Yeniden Başlat

on:
  schedule:
    - cron: '0 */5 * * *'  # Her 5 saatte bir
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: RDP'yi Yeniden Başlat
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-main.yml/dispatches \
            -d '{"ref":"main"}'
